# This workflow performs continuous fuzzing on PRs, and against the main branch.
#
# Each run executes the configured fuzzers for 2 minutes, and any failures are
# captured and uploaded as CI artefacts.
#
# The generated corpus of "interesting" inputs is incrementally built over time,
# caching the results of one fuzz run and feeding them into the next.

name: fuzz

permissions:
  contents: read

on:
  workflow_call:
  pull_request:
  merge_group:
  push:
    branches: [main]

env:
  # https://github.com/aws/aws-lc-rs/issues/569
  AWS_LC_FIPS_SYS_CC: clang

jobs:
  fuzz:
    strategy:
      matrix:
        fuzzer:
          - name: "ffi_io"
            dir: lib/rc-x509-ffi

    runs-on: ubuntu-latest
    container:
      image: rustlang/rust:nightly
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --all-features

      - name: Restore corpus cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          enableCrossOsArchive: true # Corpus is OS independent
          key: fuzz-corpus-${{ matrix.fuzzer.name }}-
          restore-keys: |
            fuzz-corpus-${{ matrix.fuzzer.name }}-
          path: |
            **/fuzz/corpus/

      - name: fuzz
        id: fuzz
        run: >
          cargo +nightly fuzz run
          --fuzz-dir ${{ matrix.fuzzer.dir }}/fuzz
          ${{ matrix.fuzzer.name }}
          --
          -malloc_limit_mb=256
          -rss_limit_mb=2048
          -print_final_stats=1
          -max_total_time=120

      - name: Save corpus cache
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        # If the fuzzer finds a crash, we definitely want to upload the corpus.
        if: always()
        with:
          enableCrossOsArchive: true
          key: fuzz-corpus-${{ matrix.fuzzer.name }}-${{ github.run_id }}
          path: |
            **/fuzz/corpus/

      - name: Upload crash
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf # v3.2.2
        if: failure() && steps.fuzz.outcome == 'failure'
        with:
          name: fuzz-crash-${{ matrix.fuzzer.name }}
          path: ${{ matrix.fuzzer.dir }}/fuzz/artifacts/${{ matrix.fuzzer.name }}

  # minimise the corpus on main after merge, so subsequent runs (including PR
  # fuzzing) start from a smaller, deduplicated seed set. This avoids unbounded
  # corpus growth while preserving coverage, and running on commits to main
  # avoids blocking PRs while the minimisation runs.
  minimise:
    needs: fuzz
    if: ${{ github.ref == 'refs/heads/main' }}
    strategy:
      matrix:
        fuzzer:
          - name: "ffi_io"
            dir: lib/rc-x509-ffi

    runs-on: ubuntu-latest
    container:
      image: rustlang/rust:nightly
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --all-features

      - name: Restore corpus cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          enableCrossOsArchive: true
          # Load the corpus that was cached in the "fuzz" job above.
          key: fuzz-corpus-${{ matrix.fuzzer.name }}-${{ github.run_id }}
          path: |
            **/fuzz/corpus/

      - name: minimise corpus
        run: >
          cargo +nightly fuzz cmin
          --fuzz-dir ${{ matrix.fuzzer.dir }}/fuzz
          ${{ matrix.fuzzer.name }}

      - name: Save minimised corpus
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          enableCrossOsArchive: true
          key: fuzz-corpus-${{ matrix.fuzzer.name }}-${{ github.run_id }}-min
          path: |
            **/fuzz/corpus/
