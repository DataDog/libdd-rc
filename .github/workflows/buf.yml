# Ensure protobuf changes are backwards compatible.
#
# Uses https://github.com/bufbuild/buf (also available as a vscode extension).
#
# Run locally with:
#
#  * buf lint
#  * buf format -w
#  * buf breaking --against https://github.com/DataDog/libdd-rc.git#branch=main
#
# Adding the "breaking-proto" label to a PR allows the breaking changes to be
# merged, bypassing the "breaking" gate (but not the "lint" check).

name: buf
permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  merge_group:
  push:
    branches: [main]

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          lint: true
          format: true
          breaking: false
          push: false
          archive: false
          pr_comment: false
          github_token: ${{ secrets.GITHUB_TOKEN }} # Private repo access

      - name: Check for breaking changes
        if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'breaking-proto')
        run: |
          if ! buf breaking --against "https://github.com/${{ github.repository }}.git#branch=main" --error-format github-actions; then
            echo "::error::Breaking protobuf changes detected. Add the breaking-proto label to allow breaking changes to be merged."
            exit 1
          fi
