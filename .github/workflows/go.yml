name: go

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # Pre-installed dependencies in the build image are here.
  GOPATH: "/root/go"
  # https://github.com/aws/aws-lc-rs/issues/569
  AWS_LC_FIPS_SYS_CC: clang

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/datadog/libdd-rc/rust-ci:1.93.0

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: go

      - name: Build test harness for ffi crate
        run: cargo build -p rc-x509-ffi -p rc-x509-test-harness

      - name: Generate Go protobuf via go generate
        working-directory: wrapper/go
        run: |
          go generate ./internal/testproto

      - name: Run Go tests
        working-directory: wrapper/go
        env:
          CGO_LDFLAGS: "-L../../target/debug"
          # LD_LIBRARY_PATH in run block to expand LD_LIBRARY_PATH at exec time.
        run: |
          export LD_LIBRARY_PATH="../../target/debug:$LD_LIBRARY_PATH"
          go test -v ./...
