# Build and publish the pre-built CI image to GHCR.
#
# The image is rebuilt when the Dockerfile or this workflow changes, and on a
# weekly schedule to pick up the latest nightly toolchain.

name: ci-image

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    paths:
      - ".github/images/rust-ci.Dockerfile"
      - ".github/workflows/ci-image.yml"
      - "rust-toolchain.toml"
  schedule:
    # Weekly on Monday at 05:42 UTC — rebuilds with latest nightly toolchain.
    - cron: "42 5 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/datadog/libdd-rc/rust-ci
  DOCKERFILE: .github/images/rust-ci.Dockerfile

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Rust version
        id: rust-version
        run: |
          version=$(grep '^channel = ' rust-toolchain.toml | sed 's/channel = "\(.*\)"/\1/')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          build-args: |
            RUST_VERSION=${{ steps.rust-version.outputs.version }}-slim
            BUILD_TIMESTAMP=${{ github.event.head_commit.timestamp }}
            BUILD_REF=${{ github.sha }}
            BUILD_FILE=${{ env.DOCKERFILE }}
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.rust-version.outputs.version }}
