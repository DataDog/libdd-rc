name: cbindgen

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify-header:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/datadog/libdd-rc/rust-ci:1.93.0
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: dev

      - name: Save committed header
        run: cp include/libdd_rc.h include/libdd_rc.h.committed

      - name: Generate C header via build.rs
        run: |
          cargo build --package rc-x509-ffi
          echo "Header generated at include/libdd_rc.h"

      - name: Check for differences
        run: |
          if diff -u include/libdd_rc.h.committed include/libdd_rc.h; then
            echo "Generated C header matches committed version"
            exit 0
          else
            echo "ERROR: Generated C header differs from committed version!"
            echo ""
            echo "The include/libdd_rc.h file is out of sync with the Rust FFI definitions."
            echo ""
            echo "To fix this, run the following commands locally:"
            echo "  cargo build --package rc-x509-ffi"
            echo "  git add include/libdd_rc.h"
            echo "  git commit -m 'chore: update generated C header'"
            echo ""
            echo "Differences shown above."
            exit 1
          fi
