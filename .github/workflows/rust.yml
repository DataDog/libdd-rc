# Rust source code quality checks.

name: rust
permissions:
  contents: read

on:
  workflow_call:
  pull_request:
  merge_group:
  push:
    branches: [main]

env:
  # https://github.com/aws/aws-lc-rs/issues/569
  AWS_LC_FIPS_SYS_CC: clang

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: dev
            cmd: cargo build --workspace --all-features
          - name: release
            cmd: cargo build --workspace --all-features --release
          - name: benchmarks
            cmd: cargo test --workspace --all-features --benches --no-run
    runs-on: ubuntu-latest
    container:
      image: rust:1.93.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: ${{ matrix.name }}

      - name: ${{ matrix.name }}
        run: ${{ matrix.cmd }}

  clippy:
    runs-on: ubuntu-latest
    container:
      image: rust:1.93.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: clippy

      - name: Install Clippy
        run: rustup component add clippy

      - name: Run Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    container:
      image: rust:1.93.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: test

      - name: Run tests
        run: cargo test --workspace --all-features

  # Check for banned crates, invalid sources, security advisories, and licenses
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15
        with:
          arguments: --workspace
          command: check bans sources advisories licenses
