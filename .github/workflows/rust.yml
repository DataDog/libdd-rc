# Rust source code quality checks.

name: rust
permissions:
  contents: read

on:
  workflow_call:
  pull_request:
  merge_group:
  push:
    branches: [main]

env:
  # https://github.com/aws/aws-lc-rs/issues/569
  AWS_LC_FIPS_SYS_CC: clang

jobs:
  build-dev:
    runs-on: ubuntu-latest
    container:
      image: rust:1.93.0
    steps:
      - name: Ensure node is installed for act
        if: ${{ env.ACT }}
        run: command -v node || (apt update && apt install -y nodejs zstd)

      - name: Install dependencies for aws-lc-rs
        run: apt-get update && apt-get install -y golang-go cmake clang

      - name: Install protobuf compiler
        run: apt-get install -y protobuf-compiler

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Cache Rust dependencies
        id: rust-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            target
            /usr/local/cargo/registry/index
            /usr/local/cargo/registry/cache
            /usr/local/cargo/git/db
          key: ${{ runner.os }}-cargo-dev-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-dev-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-dev-

      - name: dev
        run: cargo build --workspace --all-features

  build-release:
    runs-on: ubuntu-latest
    container:
      image: rust:1.93.0
    steps:
      - name: Ensure node is installed for act
        if: ${{ env.ACT }}
        run: command -v node || (apt update && apt install -y nodejs zstd)

      - name: Install dependencies for aws-lc-rs
        run: apt-get update && apt-get install -y golang-go cmake clang

      - name: Install protobuf compiler
        run: apt-get install -y protobuf-compiler

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Cache Rust dependencies
        id: rust-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            target
            /usr/local/cargo/registry/index
            /usr/local/cargo/registry/cache
            /usr/local/cargo/git/db
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-release-

      - name: release
        run: cargo build --workspace --all-features --release

  build-benchmarks:
    runs-on: ubuntu-latest
    container:
      image: rust:1.93.0
    steps:
      - name: Ensure node is installed for act
        if: ${{ env.ACT }}
        run: command -v node || (apt update && apt install -y nodejs zstd)

      - name: Install dependencies for aws-lc-rs
        run: apt-get update && apt-get install -y golang-go cmake clang

      - name: Install protobuf compiler
        run: apt-get install -y protobuf-compiler

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Cache Rust dependencies
        id: rust-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            target
            /usr/local/cargo/registry/index
            /usr/local/cargo/registry/cache
            /usr/local/cargo/git/db
          key: ${{ runner.os }}-cargo-benchmarks-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-benchmarks-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-benchmarks-

      - name: benchmarks
        run: cargo test --workspace --all-features --benches --no-run

  clippy:
    runs-on: ubuntu-latest
    container:
      image: rust:1.93.0
    steps:
      - name: Ensure node is installed for act
        if: ${{ env.ACT }}
        run: command -v node || (apt update && apt install -y nodejs zstd)

      - name: Install dependencies for aws-lc-rs
        run: apt-get update && apt-get install -y golang-go cmake clang

      - name: Install protobuf compiler
        run: apt-get install -y protobuf-compiler

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Cache Rust dependencies
        id: rust-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            target
            /usr/local/cargo/registry/index
            /usr/local/cargo/registry/cache
            /usr/local/cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-

      - name: Install Clippy
        run: rustup component add clippy

      - name: Run Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    container:
      image: rust:1.93.0
    steps:
      - name: Ensure node is installed for act
        if: ${{ env.ACT }}
        run: command -v node || (apt update && apt install -y nodejs zstd)

      - name: Install dependencies for aws-lc-rs
        run: apt-get update && apt-get install -y golang-go cmake clang

      - name: Install protobuf compiler
        run: apt-get install -y protobuf-compiler

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Cache Rust dependencies
        id: rust-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            target
            /usr/local/cargo/registry/index
            /usr/local/cargo/registry/cache
            /usr/local/cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace --all-features

  # Check for banned crates, invalid sources, security advisories, and licenses
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15
        with:
          arguments: --workspace
          command: check bans sources advisories licenses
