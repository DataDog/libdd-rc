# Rust source code quality checks.

name: miri
permissions:
  contents: read

on:
  workflow_call:
  pull_request:
  merge_group:
  push:
    branches: [main]

env:
  # https://github.com/aws/aws-lc-rs/issues/569
  AWS_LC_FIPS_SYS_CC: clang

jobs:
  test-miri:
    runs-on: ubuntu-latest
    container:
      image: rustlang/rust:nightly # Miri is nightly only!
    steps:
      - name: Ensure node is installed for act
        if: ${{ env.ACT }}
        run: command -v node || (apt update && apt install -y nodejs zstd)

      - name: Install dependencies for aws-lc-rs
        run: apt-get update && apt-get install -y golang-go cmake clang

      - name: Install protobuf compiler
        run: apt-get install -y protobuf-compiler

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Cache Rust dependencies
        id: rust-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            target
            /usr/local/cargo/registry/index
            /usr/local/cargo/registry/cache
            /usr/local/cargo/git/db
            **/target
          key: ${{ runner.os }}-cargo-miri-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-miri-${{ hashFiles('**/Cargo.lock') }}
            ${{ runner.os }}-cargo-miri-

      - name: install miri
        run: rustup +nightly component add miri

      - name: miri
        run: cargo +nightly miri test -p rc-x509-client ffi
