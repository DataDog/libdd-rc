# Rust source code quality checks.

name: miri
permissions:
  contents: read

on:
  workflow_call:
  pull_request:
  merge_group:
  push:
    branches: [main]

env:
  # https://github.com/aws/aws-lc-rs/issues/569
  AWS_LC_FIPS_SYS_CC: clang

jobs:
  test-miri:
    runs-on: ubuntu-latest
    container:
      image: rustlang/rust:nightly # Miri is nightly only!
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: miri

      - name: install miri
        run: rustup +nightly component add miri

      - name: miri
        run: cargo +nightly miri test -p rc-x509-ffi
