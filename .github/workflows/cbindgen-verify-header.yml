name: Verify cbindgen C Header

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cbindgen-verify-header:
    name: Verify generated C header is up-to-date
    runs-on: ubuntu-latest
    container:
      image: rust:1.93.0
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Cache Rust dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Generate C header via build.rs
        run: |
          cargo build --package rc-x509-client
          echo "Header generated at include/libdd_rc.h"

      - name: Check for differences
        run: |
          if git diff --exit-code include/libdd_rc.h; then
            echo "Generated C header matches committed version"
            exit 0
          else
            echo "ERROR: Generated C header differs from committed version!"
            echo ""
            echo "The include/libdd_rc.h file is out of sync with the Rust FFI definitions."
            echo ""
            echo "To fix this, run the following commands locally:"
            echo "  cargo build --package rc-x509-client"
            echo "  git add include/libdd_rc.h"
            echo "  git commit -m 'chore: update generated C header'"
            echo ""
            echo "Differences:"
            git diff include/libdd_rc.h
            exit 1
          fi
