# Publish crates to crates.io using trusted publishing (OIDC).
#
# Trigger: create a GitHub release (e.g. v0.1.0).
#
# Prerequisites – for each crate, a trusted publisher must be configured on
# crates.io with:
#   • Owner:      DataDog
#   • Repository: libdd-rc
#   • Workflow:    publish.yml
#   • Environment: crates-io
#
# Crates are published in dependency order so that downstream crates can
# resolve their workspace siblings from the registry.

name: publish

on:
  release:
    types: [published]

env:
  AWS_LC_FIPS_SYS_CC: clang

jobs:
  publish:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/datadog/libdd-rc/rust-ci:1.93.0

    environment:
      name: crates-io

    permissions:
      id-token: write
      contents: read

    strategy:
      max-parallel: 1
      matrix:
        crate:
          - rc-x509-proto
          - rc-x509-test-helpers
          - rc-crypto
          - rc-x509-roots
          - rc-x509-trust
          - rc-x509-client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec # v1
        id: auth

      - name: Publish ${{ matrix.crate }}
        run: |
          cargo publish -p ${{ matrix.crate }} > publish.log 2>&1 \
            || grep -q "already exists" publish.log \
            || { cat publish.log; exit 1; }
          cat publish.log
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
