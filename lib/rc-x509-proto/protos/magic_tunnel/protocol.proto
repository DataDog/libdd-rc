syntax = "proto3";

// This package contains the wire types for the Magic Tunnel feature.
package rc.x509.magic_tunnel.v1;

// A `Namespace` specifies which handler receives the payload being transmitted
// to the Agent (or other clients of RC).
//
// The primary purpose of a `Namespace` is to isolate across different teams /
// products / features supported by Magic Tunnel or other future features,
// directing payloads to the appropriate namespace handler.
//
// A namespace handler can register to receive messages from multiple
// namespaces, but a namespace can have at most one handler (consider internal
// fanout within the handler if necessary).
//
// ```text
//                                Datadog Server
//
//                                       │
//                                       ▼
//                            ┌────────────────────┐
//                            │     RC Client      │
//                            └────────────────────┘
//                                       │
//                                 Magic │ Tunnel
//                                       │
//     ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ┼ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─
//   D                                   │                                 D
//   I          Namespace:               │                Namespace:       I
//   S             Bananas  ┌────────────┴─────────────┐  Platanos         S
//   P                      ▼                          ▼                   P
//   A           ┌────────────────────┐     ┌────────────────────┐         A
//   T           │    Team Bananas    │     │   Team Platanos    │         T
//   C           └────────────────────┘     └────────────────────┘         C
//   H                      │                          │                   H
//     ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─│─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ─ ┼ ─ ─ ─ ─ ─ ─ ─ ─ ─
//                          │                          │
//                   ┌──────┴───┐                      │
//                   │          ▼                      ▼
//         Subtopic: │   ┌────────────┐         ┌────────────┐
//        Function A │   │ Function B │         │ Functions  ├┐
//                   ▼   └────────────┘         └┬───────────┘│
//            ┌────────────┐                     └────────────┘
//            │ Function A │
//            └────────────┘
// ```
//
// Once a payload is routed to the correct namespace handler, it is the
// responsibility of the namespace handler to discriminate across appropriate
// subtopics, if any.
//
// This enum SHOULD contain an entry for high level, product / team namespaces
// only; it SHOULD NOT contain an entry for each payload type supported by a
// team / product (define subtopics instead).
enum Namespace {
  NAMESPACE_UNSPECIFIED = 0;
  NAMESPACE_REMOTE_CONFIG = 1;
}

// Push a payload down to a namespace handler.
message MagicTunnelRequest {
  // The namespace this payload will be delivered to.
  Namespace namespace = 2;

  // The protobuf-serialised payload bytes to pass to the namespace handler for
  // this namespace.
  //
  // Payloads MUST internally discriminate across subtopics. The recommended way
  // to implement subtopics is to use a oneof:
  //
  // ```protobuf
  // message TeamBananasRequest {
  //   oneof subtopic {
  //     Ping ping_request = 1;
  //     Exec exec_request = 2;
  //     // etc...
  //   }
  // }
  // ```
  //
  // This provides a well-typed payload structure and allows future extension of
  // the payload for this namespace in a backwards compatible way.
  bytes payload = 3;
}

// A response to a MagicTunnelRequest.
message MagicTunnelResponse {
  oneof result {
    // The response payload returned by the namespace handler, which may be a
    // structured error.
    //
    // Like the request payload, this value MUST be internally discriminated by
    // subtopic.
    bytes response = 2;

    // The namespace handler implementation returned an execution error.
    //
    // This is returned to the backend for debugging and logging purposes.
    // Integrations SHOULD NOT parse this string (or any error string) to
    // classify failures. Instead prefer returning a response payload that
    // contains a structured error response.
    string handler_error = 4;
  }
}
