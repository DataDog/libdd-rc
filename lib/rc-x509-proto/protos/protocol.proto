syntax = "proto3";

// This package provides the core protocol types used "on the wire" between the
// Remote Config backend delivery servers, and a Datadog Agent (or other clients
// of RC).
package rc.x509.protocol.v1;

import "magic_tunnel/protocol.proto";

// Protocol message definitions.
//
// All messages exchanged over an "RC connection" MUST be either:
//
//   * ServerToClient: for messages originating from the server
//   * ClientToServer: for messages originating from the client
//
// Messages should be added to the oneof enum in each, and MUST always refer to
// a variant specific message type and NOT a primitive value type to enable
// backwards compatible changes to the variant's data in the future.
//
// Prefer versioning within message types using protobuf's tooling ("reserved"
// fields), instead of versioning at the enum level (not: thing_v1, thing_v2,
// etc).

// Messages from the RC backend server, to an RC client.
message ServerToClient {
  oneof message {
    Ping ping = 1;

    // The server is pushing a new X509 certificate to the client to consider
    // when chain building.
    //
    // This certificate MUST be treated as an untrusted input.
    Certificate certificate_push = 2;

    // Pass a message to the host application.
    DispatchRequest dispatch = 3;
  }
}

// Messages from an RC client, to the RC backend server.
message ClientToServer {
  oneof message {
    Pong pong = 1;

    // The opening message sent when establishing a new connection.
    ClientHello client_hello = 2;

    // Respond with the return value from a dispatch call.
    DispatchResponse dispatch = 3;
  }
}

// An application-level ping message. Each `Ping` generates exactly one `Pong`.
//
// While the WebSocket transport to the RC delivery backend has a transport
// level "ping" control frame, it doesn't capture the full end-to-end delivery
// path as it never transits through the client library.
//
// This application-level ping frame arrives as a standard message to the client
// library, and transits through the FFI layer in addition to the WebSocket
// transport.
//
// This message is useful for ensuring the client is still alive, in addition to
// the WebSocket connection.
message Ping {}

// The response to a `Ping` message from the server.
message Pong {}

message ClientHello {
  // The unique, sequential connection ID assigned to this logical client
  // connection (starting value: 0);
  //
  // This value persists for the lifetime of a logical client connection, each
  // of which may experience multiple reconnection events. This value increases
  // only when multiple connections are created by the host runtime (calls to
  // `rc_conn_new()`).
  uint64 connection_id = 1;

  // The number of times this logical connection has been gracefully
  // disconnected from the RC backend by the RC server (per-`connection_id`,
  // starting value: 0).
  uint64 graceful_disconnection_count = 2;

  // The number of times this logical connection has been forcibly /
  // ungracefully disconnected from the RC backend (per-`connection_id`,
  // starting value: 0).
  uint64 ungraceful_disconnection_count = 3;
}

// An X509 certificate as raw DER-encoded bytes.
message Certificate {
  bytes der = 1;
}

// Instruct the client library to deliver a payload to the host application.
//
// Dispatch requests are expected to map one-to-one with `DispatchResponse`,
// which returns the result of the dispatch call asynchronously.
message DispatchRequest {
  // An identifier to correlate any response with this request.
  //
  // The only guarantee provided by a `correlation_id` is that it is unique per
  // connection.
  uint64 correlation_id = 1;

  oneof payload {
    rc.x509.magic_tunnel.v1.MagicTunnelRequest magic_tunnel = 2;
  }
}

// A response to the `DispatchRequest` uniquely identified by the
// `correlation_id`.
message DispatchResponse {
  // The `correlation_id` value sent in the `DispatchRequest`.
  uint64 correlation_id = 1;

  // Error conditions for the transport & dispatch logic.
  //
  // These errors describe the possible failure modes of delivering the request
  // and invoking the registered handler for the payload type.
  enum DispatchError {
    DISPATCH_ERROR_UNSPECIFIED = 0;

    // The client does not support the payload type being dispatched.
    DISPATCH_ERROR_UNKNOWN_PAYLOAD = 1;

    // The client supports the type of payload being sent, but there is no
    // handler registered to process it.
    DISPATCH_ERROR_NO_DISPATCH_HANDLER = 2;

    // The dispatch handler delivery queue is full.
    //
    // This occurs when the dispatch handler is not consuming messages fast
    // enough to keep up with the rate of new requests arriving. The message
    // will not be delivered.
    DISPATCH_ERROR_QUEUE_FULL = 3;
  }

  oneof result {
    DispatchError error = 2;
    DispatchResponsePayload payload = 3;
  }
}

/// The response payload of a successful Dispatch call.
message DispatchResponsePayload {
  oneof payload {
    rc.x509.magic_tunnel.v1.MagicTunnelResponse magic_tunnel = 1;
  }
}
