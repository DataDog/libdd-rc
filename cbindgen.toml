/**
 * libdd-rc - Remote Configuration Client Library
 *
 * C FFI interface for the Datadog Remote Configuration X509 client library.
 */
"""
include_guard = "LIBDD_RC_H"
autogen_warning = "/* Warning: This file is autogenerated by cbindgen. Do not modify. */"
tab_width = 4
line_length = 100
documentation = true
documentation_style = "c"

[export]
include = ["Ctx", "FFIConnection", "SendRet", "RecvRet"]

[export.rename]
"SendRet" = "send_ret_t"
"RecvRet" = "recv_ret_t"

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[defines]
"target_os = windows" = "DD_RC_WINDOWS"
"target_os = linux" = "DD_RC_LINUX"
"target_os = macos" = "DD_RC_MACOS"
